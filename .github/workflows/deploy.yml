name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: docs/Gemfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Checkout synctoolbox
        uses: actions/checkout@v4
        with:
          repository: Curucail/synctoolbox
          ref: numba-to-numpy-vectorization
          path: .tmp/synctoolbox

      - name: Build synctoolbox wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir "$GITHUB_WORKSPACE/synctoolbox-dist" "$GITHUB_WORKSPACE/.tmp/synctoolbox"
          built_wheel="$(find "$GITHUB_WORKSPACE/synctoolbox-dist" -maxdepth 1 -name 'synctoolbox-*.whl' -print -quit)"
          expected_wheel="$GITHUB_WORKSPACE/synctoolbox-dist/synctoolbox-1.4.2-py3-none-any.whl"
          if [ "$built_wheel" != "$expected_wheel" ]; then
            cp "$built_wheel" "$expected_wheel"
          fi
      
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build project and docs assets
        run: npm run docs:build
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: '4.0.7'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --source ./docs --destination ./_site --baseurl "${{ steps.pages.outputs.base_path }}"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
