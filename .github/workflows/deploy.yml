name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: docs/Gemfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build project
        run: npm run build
      
      - name: Prepare Jekyll site
        run: |
          mkdir -p docs/css docs/js
          cp dist/css/trackswitch.min.css docs/css/
          cp dist/js/trackswitch.min.js docs/js/
          cp dist/js/trackswitch-interactive.js docs/js/
          cp dist/js/trackswitch-alignment-worker.js docs/js/
          cp dist/js/synctoolbox-1.4.2-py3-none-any.whl docs/js/
          cp dist/js/libtsm-1.1.2-py3-none-any.whl docs/js/
          npm run build:docs-assets
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: '4.0.7'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --source ./docs --destination ./_site
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
