name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Checkout synctoolbox
        uses: actions/checkout@v4
        with:
          repository: Curucail/synctoolbox
          ref: numba-to-numpy-vectorization
          path: .tmp/synctoolbox

      - name: Build synctoolbox wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir "$GITHUB_WORKSPACE/synctoolbox-dist" "$GITHUB_WORKSPACE/.tmp/synctoolbox"
          built_wheel="$(find "$GITHUB_WORKSPACE/synctoolbox-dist" -maxdepth 1 -name 'synctoolbox-*.whl' -print -quit)"
          expected_wheel="$GITHUB_WORKSPACE/synctoolbox-dist/synctoolbox-1.4.2-py3-none-any.whl"
          if [ "$built_wheel" != "$expected_wheel" ]; then
            cp "$built_wheel" "$expected_wheel"
          fi

      - name: Use latest npm CLI
        run: npm install -g npm@latest

      - name: Verify release tag matches package version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.TAG_NAME.replace(/^v/, ''); if (pkg.version !== tag) { console.error(`package.json version ${pkg.version} does not match release tag ${process.env.TAG_NAME}`); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify published package contents
        run: npm pack --dry-run

      - name: Publish stable release
        if: ${{ !github.event.release.prerelease }}
        run: npm publish --provenance

      - name: Publish prerelease to next
        if: ${{ github.event.release.prerelease }}
        run: npm publish --tag next --provenance
