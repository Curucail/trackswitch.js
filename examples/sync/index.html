<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trackswitch.js - Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <style media="screen">
        body {
            font-family: sans-serif;
        }

        .back-link {
            display: inline-block;
            margin: 16px 0 24px 16px;
            color: #ed8c01;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <a class="back-link" href="/examples/">Back to examples</a>
    <trackswitch-player id="player" style="display: block; width: 50%; margin: 0 auto;">
        <script type="application/json">
            {
                "media": {
                    "score": { "type": "musicxml", "src": "data/Schubert_D911-03.xml" },
                    "midi":  { "type": "midi",     "src": "data/Schubert_D911-03.mid" },
                    "hu33": {
                        "type": "audio",
                        "title": "Schubert: Winterreise, D. 911: No. 3 - HU33",
                        "src": "data/Schubert_D911-03_HU33.wav",
                        "srcSynchronized": { "src": "data/Schubert_D911-03_HU33.wav", "timeline": "reference" }
                    },
                    "sc06": {
                        "type": "audio",
                        "title": "Schubert: Winterreise, D. 911: No. 3 - SC06",
                        "src": "data/Schubert_D911-03_SC06.wav",
                        "srcSynchronized": { "src": "data/Schubert_D911-03_SC06_syncronized.wav", "timeline": "reference" }
                    }
                },
                "alignment": {
                    "src": "data/alignment.csv",
                    "referenceTimeline": "reference",
                    "timelines": {
                        "reference": "time_sync_reference",
                        "score": "measure_Schubert_D911-03_2",
                        "midi": "time_Schubert_D911-03",
                        "hu33": "time_Schubert_D911-03_HU33",
                        "sc06": "time_Schubert_D911-03_SC06"
                    },
                    "outside": "clamp",
                    "duplicatePlacements": "average"
                },
                "markers": {
                    "hu33Measures": {
                        "src": "data/HU33-markers.csv",
                        "timeline": "hu33",
                        "timeCol": "start",
                        "labelCol": "label"
                    },
                    "sc06Structure": {
                        "src": "data/SC06-markers.csv",
                        "timeline": "sc06",
                        "timeCol": "start",
                        "labelCol": "structure"
                    }
                },
                "views": [
                    {
                        "type": "sheetMusic",
                        "mediaID": "score",
                        "maxHeight": 370,
                        "maxWidth": 1000,
                        "renderScale": 0.7,
                        "followPlayback": true,
                        "cursorColor": "#999999",
                        "cursorAlpha": 0.4
                    },
                    {
                        "type": "midi",
                        "mediaID": "midi",
                        "height": 180,
                        "maxZoom": 5,
                        "playbackFollowMode": "center",
                        "timer": true
                    },
                    {
                        "type": "waveform",
                        "sourceTracks": ["hu33"],
                        "waveformBarWidth": 1,
                        "height": 100,
                        "timer": true,
                        "alignedPlayhead": true,
                        "markerLayers": [
                            { "set": "hu33Measures", "color": "#ed8c01", "line": "dashed" }
                        ]
                    },
                    {
                        "type": "waveform",
                        "sourceTracks": ["sc06"],
                        "waveformBarWidth": 1,
                        "height": 100,
                        "timer": true,
                        "alignedPlayhead": true,
                        "markerLayers": [
                            { "set": "sc06Structure", "color": "#ed8c01", "line": "dashed" }
                        ]
                    },
                    { "type": "warpingMatrix", "x": "hu33", "y": "sc06", "height": 200 },
                    { "type": "trackList", "tracks": ["hu33", "sc06"] }
                ],
                "features": {
                    "repeat": false,
                    "timer": true,
                    "trackVolumeControls": true,
                    "trackPanControls": true,
                    "seekBar": true,
                    "keyboard": true,
                    "globalVolume": true,
                    "looping": true,
                    "customizablePanelOrder": false,
                    "tabView": false,
                    "iosAudioUnlock": true,
                    "muteOtherPlayerInstances": true
                }
            }
        </script>
    </trackswitch-player>

    <script type="module" src="../../src/browser.ts"></script>
</body>

</html>
