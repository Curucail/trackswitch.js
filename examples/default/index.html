<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trackswitch.js - Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style media="screen">
        body {
            font-family: sans-serif;
        }

        .back-link {
            display: inline-block;
            margin: 16px 0 24px 16px;
            color: #ed8c01;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <a class="back-link" href="/examples/">Back to examples</a>
    <trackswitch-player id="player" style="display: block; width: 50%; margin: 0 auto;">
        <script type="application/json">
            {
                "media": {
                    "violins": { "type": "audio", "title": "Violins", "image": "data/violins.png", "src": "data/violins.mp3" },
                    "synths":  { "type": "audio", "title": "Synths",  "image": "data/synth.png",   "src": "data/synth.mp3" },
                    "bass":    { "type": "audio", "title": "Bass",    "image": "data/bass.png",    "src": "data/bass.mp3" },
                    "drums":   { "type": "audio", "title": "Drums",   "image": "data/drums.png",   "src": "data/drums.mp3" }
                },
                "markers": {
                    "violinsCues": {
                        "src": "data/violins-markers.csv",
                        "timeline": "violins",
                        "timeCol": "position_seconds",
                        "labelCol": "annotation"
                    },
                    "synthCues": {
                        "src": "data/synth-markers.csv",
                        "timeline": "synths",
                        "timeCol": "cue_at"
                    }
                },
                "presets": {
                    "all":       { "label": "All Tracks",       "tracks": ["violins", "synths", "bass", "drums"] },
                    "strings":   { "label": "Violins & Synths", "tracks": ["violins", "synths"] },
                    "rhythm":    { "label": "Drums & Bass",     "tracks": ["bass", "drums"] },
                    "drumsOnly": { "label": "Drums Only",       "tracks": ["drums"] }
                },
                "views": [
                    {
                        "type": "image",
                        "src": "data/cover.png",
                        "seekable": true,
                        "markerLayers": [
                            { "set": "violinsCues", "color": "#ed8c01", "line": "solid" },
                            { "set": "synthCues", "color": "#ed8c01", "line": "solid" }
                        ]
                    },
                    {
                        "type": "waveform",
                        "height": 150,
                        "waveformBarWidth": 1,
                        "markerLayers": [
                            { "set": "violinsCues", "color": "#ed8c01", "line": "solid" },
                            { "set": "synthCues", "color": "#ed8c01", "line": "solid" }
                        ]
                    },
                    {
                        "type": "text",
                        "text": "TrackSwitch.js - Default Mode Example",
                        "bold": false,
                        "italic": false,
                        "fontSize": 32
                    },
                    {
                        "type": "trackList",
                        "tracks": ["violins", "synths", "bass", "drums"]
                    }
                ],
                "features": {
                    "exclusiveSolo": false,
                    "globalVolume": true,
                    "trackVolumeControls": true,
                    "trackPanControls": true,
                    "repeat": false,
                    "tabView": false,
                    "iosAudioUnlock": true,
                    "keyboard": true,
                    "looping": true,
                    "seekBar": true,
                    "timer": true,
                    "customizablePanelOrder": false,
                    "muteOtherPlayerInstances": true
                }
            }
        </script>
    </trackswitch-player>

    <script type="module" src="../../src/browser.ts"></script>
</body>

</html>
